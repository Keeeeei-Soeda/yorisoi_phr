<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>体験記詳細 — よりそい PHR</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* フェーズナビゲーション */
    .phase-nav {
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
      padding: 10px 16px;
      display: flex;
      gap: 6px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      position: sticky;
      top: 56px;
      z-index: 90;
    }

    .phase-nav::-webkit-scrollbar { display: none; }

    .phase-nav-btn {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      border: 1.5px solid var(--gray-300);
      background: var(--white);
      color: var(--gray-600);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }

    .phase-nav-btn:active {
      background: var(--gray-100);
    }

    /* 免責 */
    .disclaimer {
      background: #fefce8;
      border: 1px solid #fde68a;
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 12px;
      color: #92400e;
      line-height: 1.5;
      margin-bottom: 20px;
    }

    /* 体験記ヘッダー */
    .story-header {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 16px;
    }

    .story-header-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .disease-badge {
      padding: 3px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 700;
    }

    .disease-badge-cml  { background: #dbeafe; color: #1d4ed8; }
    .disease-badge-aml  { background: #fee2e2; color: #991b1b; }
    .disease-badge-all  { background: #fef3c7; color: #92400e; }
    .disease-badge-cll  { background: #dcfce7; color: #14532d; }
    .disease-badge-other { background: var(--gray-200); color: var(--gray-600); }

    .attr-badge {
      font-size: 12px;
      color: var(--gray-500);
      background: var(--gray-100);
      padding: 3px 10px;
      border-radius: 10px;
    }

    .story-main-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--gray-800);
      line-height: 1.5;
    }

    /* フェーズセクション */
    .phase-section {
      margin-bottom: 20px;
    }

    .phase-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      margin-bottom: 12px;
    }

    .phase-icon {
      font-size: 20px;
      line-height: 1;
    }

    .phase-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--gray-800);
    }

    /* 事実タグ */
    .fact-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }

    .fact-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      line-height: 1.4;
    }

    .fact-tag-drug         { background: #dbeafe; color: #1d4ed8; }
    .fact-tag-side_effect  { background: #fef3c7; color: #92400e; }
    .fact-tag-lab_value    { background: #f3e8ff; color: #6b21a8; }
    .fact-tag-work_life    { background: #dcfce7; color: #14532d; }
    .fact-tag-decision     { background: #ffe4e6; color: #9f1239; }
    .fact-tag-communication { background: #e0f2fe; color: #0369a1; }

    /* 事実コンテンツ */
    .fact-content {
      font-size: 14px;
      color: var(--gray-700);
      line-height: 1.8;
      margin-bottom: 12px;
    }

    /* 感情展開ボタン */
    .emotion-toggle-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 600;
      border: 1.5px solid var(--brand-200);
      background: var(--white);
      color: var(--brand-700);
      cursor: pointer;
      transition: background 0.15s;
      width: 100%;
      justify-content: center;
    }

    .emotion-toggle-btn:active {
      background: var(--brand-50);
    }

    /* 感情コンテンツ（展開後） */
    .emotion-content {
      display: none;
      margin-top: 10px;
      padding: 14px;
      background: #fff7ed;
      border-left: 4px solid #fb923c;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      font-size: 14px;
      color: var(--gray-700);
      line-height: 1.8;
      animation: slideDown 0.25s ease;
    }

    .emotion-content.open {
      display: block;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .emotion-label {
      font-size: 11px;
      font-weight: 700;
      color: #9a3412;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* セクションカード */
    .section-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
    }

    /* ローディング */
    .page-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 12px;
      color: var(--gray-400);
    }
  </style>
</head>
<body>
  <!-- ヘッダー -->
  <div class="header" id="main-header">
    <button class="header-back" onclick="history.back()">
      <span class="material-symbols-outlined">arrow_back</span>
    </button>
    <h1 id="header-title">体験記</h1>
  </div>

  <!-- フェーズナビ（動的生成） -->
  <div class="phase-nav" id="phase-nav"></div>

  <div class="content" id="main-content">
    <div class="page-loading">
      <div class="loading-spinner"></div>
      <p class="text-sm">読み込み中...</p>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js" defer></script>
  <script src="/js/liff-init.js"></script>
  <script>
    const DISEASE_LABELS = {
      cml: "CML（慢性骨髄性白血病）",
      aml: "AML（急性骨髄性白血病）",
      all: "ALL（急性リンパ性白血病）",
      cll: "CLL（慢性リンパ性白血病）",
      other: "その他の白血病",
    };

    const GENDER_LABELS = {
      male: "男性",
      female: "女性",
      unanswered: "",
    };

    const FACT_TAG_ICONS = {
      drug: "💊",
      side_effect: "⚠️",
      lab_value: "📊",
      work_life: "💼",
      decision: "🔀",
      communication: "🏥",
    };

    // デフォルトフェーズ定義（テンプレートから取得できない場合）
    const DEFAULT_PHASES = {
      diagnosis:       { label: "診断期",         color: "#dbeafe", icon: "search" },
      treatment_start: { label: "治療開始",       color: "#d1fae5", icon: "medication" },
      ongoing:         { label: "治療継続",       color: "#bbf7d0", icon: "loop" },
      observation:     { label: "経過観察",       color: "#e0f2fe", icon: "monitor_heart" },
      relapse:         { label: "再発・治療変更", color: "#fee2e2", icon: "warning" },
      remission:       { label: "寛解・回復",     color: "#f0fdf4", icon: "check_circle" },
    };

    // 展開状態（セッション内保持）
    const emotionOpenStates = {};

    document.addEventListener("DOMContentLoaded", async () => {
      const params = new URLSearchParams(location.search);
      const storyId = params.get("id");

      if (!storyId) {
        showError("体験記IDが指定されていません");
        return;
      }

      try {
        const { template } = await initLiff();

        // ヘッダー色
        if (template?.color) {
          document.getElementById("main-header").style.background =
            `linear-gradient(135deg, ${template.color}, ${template.color}dd)`;
        }

        // フェーズ定義をテンプレートから取得
        const phaseConfig = buildPhaseConfig(template);

        // 体験記詳細を取得
        const story = await apiGet(`/api/stories/${encodeURIComponent(storyId)}`);
        renderStory(story, phaseConfig);

      } catch (err) {
        console.error("Detail error:", err);
        showError("体験記の読み込みに失敗しました");
      }
    });

    function buildPhaseConfig(template) {
      const config = { ...DEFAULT_PHASES };
      if (template?.storiesConfig?.phases) {
        template.storiesConfig.phases.forEach((p) => {
          config[p.id] = { label: p.label, color: p.color, icon: p.icon };
        });
      }
      return config;
    }

    function renderStory(story, phaseConfig) {
      // ヘッダータイトル（短縮）
      const shortTitle = story.title.length > 20 ? story.title.slice(0, 20) + "…" : story.title;
      document.getElementById("header-title").textContent = shortTitle;

      // セクションを phase_order でソート
      const sections = [...(story.sections || [])].sort((a, b) => a.phase_order - b.phase_order);

      // フェーズナビを生成
      renderPhaseNav(sections, phaseConfig);

      // メインコンテンツ
      const diseaseKey = story.disease_type || "other";
      const ageText = story.age_at_diagnosis ? `${story.age_at_diagnosis}代` : "";
      const genderText = story.gender && story.gender !== "unanswered"
        ? GENDER_LABELS[story.gender] || "" : "";

      let html = `
        <div class="story-header">
          <div class="story-header-meta">
            <span class="disease-badge disease-badge-${escapeHtml(diseaseKey)}">${escapeHtml(DISEASE_LABELS[diseaseKey] || diseaseKey)}</span>
            ${ageText ? `<span class="attr-badge">${escapeHtml(ageText)}</span>` : ""}
            ${genderText ? `<span class="attr-badge">${escapeHtml(genderText)}</span>` : ""}
          </div>
          <div class="story-main-title">${escapeHtml(story.title)}</div>
        </div>

        <div class="disclaimer">
          ⚠️ 本コンテンツは個人の体験であり、治療の推奨ではありません。
          治療に関する判断は必ず主治医にご相談ください。
        </div>
      `;

      // 各フェーズセクション
      sections.forEach((section) => {
        const phase = phaseConfig[section.phase] || { label: section.phase, color: "#e5e5e5", icon: "circle" };
        const sectionId = `section-${escapeHtml(section.section_id)}`;

        const factTagsHtml = (section.fact_tags || []).map((tag) => {
          const icon = FACT_TAG_ICONS[tag.category] || "";
          const cls = `fact-tag-${tag.category}`;
          return `<span class="fact-tag ${escapeHtml(cls)}">${icon} ${escapeHtml(tag.value)}</span>`;
        }).join("");

        const hasEmotion = section.emotion_content && section.emotion_content.trim();

        html += `
          <div class="phase-section" id="${sectionId}">
            <div class="phase-header" style="background: ${phase.color}20; border-left: 4px solid ${phase.color};">
              <span class="phase-icon material-symbols-outlined" style="color: ${phase.color};">${escapeHtml(phase.icon)}</span>
              <span class="phase-title">${escapeHtml(phase.label)}</span>
            </div>
            <div class="section-card">
              ${factTagsHtml ? `<div class="fact-tags">${factTagsHtml}</div>` : ""}
              <div class="fact-content">${escapeHtml(section.fact_content || "")}</div>
              ${hasEmotion ? `
                <button class="emotion-toggle-btn" onclick="toggleEmotion('${escapeHtml(section.section_id)}')" id="btn-${escapeHtml(section.section_id)}">
                  <span class="material-symbols-outlined" style="font-size:16px;">expand_more</span>
                  気持ちも読む
                </button>
                <div class="emotion-content" id="emotion-${escapeHtml(section.section_id)}">
                  <div class="emotion-label">💭 気持ち・体験</div>
                  ${escapeHtml(section.emotion_content)}
                </div>
              ` : ""}
            </div>
          </div>`;
      });

      if (sections.length === 0) {
        html += `<div class="empty-state">
          <div class="empty-state-icon">📖</div>
          <p class="empty-state-text">セクションデータがありません</p>
        </div>`;
      }

      document.getElementById("main-content").innerHTML = html;

      // セッション保持された展開状態を復元
      Object.keys(emotionOpenStates).forEach((id) => {
        if (emotionOpenStates[id]) applyEmotionOpen(id, true, false);
      });
    }

    function renderPhaseNav(sections, phaseConfig) {
      const nav = document.getElementById("phase-nav");
      const html = sections.map((section) => {
        const phase = phaseConfig[section.phase] || { label: section.phase };
        const sectionId = `section-${section.section_id}`;
        return `<button class="phase-nav-btn" onclick="scrollToSection('${escapeHtml(sectionId)}')">${escapeHtml(phase.label)}</button>`;
      }).join("");
      nav.innerHTML = html;
    }

    function scrollToSection(sectionId) {
      const el = document.getElementById(sectionId);
      if (el) {
        const offset = 110; // ヘッダー + フェーズナビの高さ
        const top = el.getBoundingClientRect().top + window.scrollY - offset;
        window.scrollTo({ top, behavior: "smooth" });
      }
    }

    function toggleEmotion(sectionId) {
      const isOpen = emotionOpenStates[sectionId] || false;
      applyEmotionOpen(sectionId, !isOpen, true);
    }

    function applyEmotionOpen(sectionId, open, animate) {
      emotionOpenStates[sectionId] = open;
      const contentEl = document.getElementById(`emotion-${sectionId}`);
      const btnEl = document.getElementById(`btn-${sectionId}`);
      if (!contentEl || !btnEl) return;

      if (open) {
        contentEl.classList.add("open");
        btnEl.innerHTML = `<span class="material-symbols-outlined" style="font-size:16px;">expand_less</span>気持ちを閉じる`;
      } else {
        contentEl.classList.remove("open");
        btnEl.innerHTML = `<span class="material-symbols-outlined" style="font-size:16px;">expand_more</span>気持ちも読む`;
      }
    }

    function showError(msg) {
      const diseaseParam = _diseaseId ? `?disease=${_diseaseId}` : "";
      document.getElementById("main-content").innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon" style="color:var(--danger)">⚠️</div>
          <p class="empty-state-text">${escapeHtml(msg)}</p>
          <a href="/stories.html${diseaseParam}" class="btn btn-primary mt-16" style="width:auto; text-decoration:none;">
            体験記一覧に戻る
          </a>
        </div>`;
    }
  </script>
</body>
</html>
