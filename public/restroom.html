<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>トイレさがし - よりそい PHR</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" />
  <style>
    body { padding-bottom: 0; }
    .content { padding: 0; padding-bottom: 0; }

    #map {
      width: 100%;
      height: calc(100vh - 52px - 76px);
      background: #e8f4ea;
    }

    /* Leaflet マーカー（カスタムアイコンの土台） */
    .pin-wrap { font-family: inherit; }
    .pin-wrap .pin {
      width: 28px; height: 28px; border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      border: 2px solid #fff;
    }
    .pin-wrap .pin .material-symbols-outlined {
      transform: rotate(45deg);
      font-size: 16px; color: #fff;
    }
    .pin-wrap.barrier .pin { background: #0d9488; }
    .pin-wrap.normal .pin  { background: #ec4899; }

    /* 現在地マーカー */
    .me-dot {
      width: 16px; height: 16px; background: #4285f4;
      border: 3px solid #fff; border-radius: 50%;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    /* コントロールバー */
    .map-controls {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px; background: var(--white); padding: 10px 14px;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.1); z-index: 800;
      display: flex; flex-direction: column; gap: 6px;
    }
    .map-controls .row { display: flex; gap: 10px; }
    .ctrl-btn {
      flex: 1; padding: 11px; border-radius: 12px; font-size: 14px; font-weight: 700;
      border: none; cursor: pointer; text-align: center; letter-spacing: 1px;
    }
    .ctrl-btn:active { transform: scale(0.97); }
    .ctrl-btn-primary { background: var(--brand-500, #0d9488); color: #fff; }
    .ctrl-btn-outline { background: #fff; color: var(--brand-700, #115e59); border: 2px solid var(--brand-500, #0d9488); }
    .attrib-line {
      font-size: 10px; color: var(--gray-500); text-align: center; line-height: 1.4;
    }
    .attrib-line a { color: var(--gray-600); text-decoration: underline; }

    /* 情報パネル */
    .info-panel {
      position: fixed; bottom: 86px; left: 50%; transform: translateX(-50%);
      width: calc(100% - 24px); max-width: 406px;
      background: var(--white); border-radius: 14px; box-shadow: 0 6px 20px rgba(0,0,0,0.18);
      padding: 14px 16px 12px; z-index: 850;
    }
    .info-panel.hidden { display: none; }
    .info-title-row { display: flex; align-items: flex-start; gap: 8px; }
    .info-panel-title { font-size: 15px; font-weight: 700; flex: 1; line-height: 1.4; }
    .info-panel-close {
      background: none; border: none; font-size: 22px; line-height: 1;
      color: var(--gray-400); cursor: pointer; padding: 0 4px;
    }
    .info-badge {
      display: inline-block; padding: 2px 8px; border-radius: 10px;
      font-size: 11px; font-weight: 700; margin: 6px 4px 0 0;
    }
    .info-badge.barrier { background: #ccfbf1; color: #115e59; }
    .info-badge.normal  { background: #fce7f3; color: #9d174d; }
    .info-panel-detail { font-size: 12.5px; color: var(--gray-700); margin-top: 8px; line-height: 1.5; white-space: pre-wrap; }
    .info-panel-addr { font-size: 12px; color: var(--gray-500); margin-top: 4px; }
    .info-panel-dist { font-size: 13px; color: var(--brand-700, #115e59); font-weight: 700; margin-top: 6px; }
    .info-actions { display: flex; gap: 8px; margin-top: 10px; }
    .info-action-btn {
      flex: 1; padding: 8px; border-radius: 10px;
      background: var(--gray-100, #f3f4f6); color: var(--gray-800, #1f2937);
      font-size: 12.5px; font-weight: 700; text-decoration: none;
      display: flex; align-items: center; justify-content: center; gap: 4px;
      border: 1px solid var(--gray-200, #e5e7eb);
    }
    .info-action-btn:active { transform: scale(0.97); }
    .info-action-btn .material-symbols-outlined { font-size: 16px; }

    /* GPS状態 */
    .gps-status {
      position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.7); color: var(--white); padding: 8px 16px;
      border-radius: 20px; font-size: 13px; z-index: 870;
    }
    .gps-status.hidden { display: none; }

    /* 上部バナー */
    .src-banner {
      background: #ecfeff; color: #155e75; padding: 6px 12px;
      font-size: 11.5px; text-align: center; font-weight: 600;
      border-bottom: 1px solid #cffafe;
    }

    /* オストメイトJP誘導（情報パネル内） */
    .ostomate-link {
      display: block; margin-top: 10px; padding: 8px 10px;
      background: #fef3c7; border: 1px solid #fcd34d; border-radius: 10px;
      font-size: 11.5px; color: #92400e; text-decoration: none; line-height: 1.45;
    }
    .ostomate-link strong { color: #78350f; }
  </style>
</head>
<body>
  <div class="header">
    <button class="header-back" onclick="location.href='/'">&larr;</button>
    <h1>トイレさがし</h1>
  </div>

  <div class="src-banner" id="src-banner">読み込み中…</div>

  <div class="content">
    <div id="map"></div>
  </div>

  <div class="gps-status hidden" id="gps-status">位置情報を取得中…</div>

  <!-- 施設情報パネル -->
  <div class="info-panel hidden" id="info-panel">
    <div class="info-title-row">
      <div class="info-panel-title" id="info-title"></div>
      <button class="info-panel-close" id="info-close" aria-label="閉じる">&times;</button>
    </div>
    <div id="info-badges"></div>
    <div class="info-panel-addr" id="info-addr"></div>
    <div class="info-panel-detail" id="info-detail"></div>
    <div class="info-panel-dist" id="info-dist"></div>
    <div class="info-actions">
      <a class="info-action-btn" id="btn-gmap" href="#" target="_blank" rel="noopener">
        <span class="material-symbols-outlined">map</span>Google Mapsで開く
      </a>
      <a class="info-action-btn" id="btn-route" href="#" target="_blank" rel="noopener">
        <span class="material-symbols-outlined">directions_walk</span>経路
      </a>
    </div>
    <a class="ostomate-link" id="ostomate-link"
       href="https://www.ostomate.jp/" target="_blank" rel="noopener">
      <strong>オストメイト対応の確認は</strong>「<u>オストメイトJP</u>」（日本オストミー協会）で詳細検索できます →
    </a>
  </div>

  <!-- コントロール -->
  <div class="map-controls">
    <div class="row">
      <button class="ctrl-btn ctrl-btn-primary" id="btn-search">このエリアで再検索</button>
      <button class="ctrl-btn ctrl-btn-outline" id="btn-myloc">現在地</button>
    </div>
    <div class="attrib-line" id="attrib-line">出典：マップナビおおさか（大阪市計画調整局・CC BY 4.0）／地図：&copy; OpenStreetMap contributors</div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    // 既定中心：大阪駅
    const FALLBACK_CENTER = { lat: 34.7024, lng: 135.4959 };
    // 大阪市データは全321件と少量なので、初回は全件マップに乗せる。
    // 「このエリアで再検索」を押した時のみ近傍に絞る。
    const INITIAL_RADIUS = 0;       // 0 = 無制限（全件）
    const INITIAL_LIMIT = 500;      // 全件OK
    const NEARBY_RADIUS = 1500;     // 「このエリアで再検索」時の半径
    const NEARBY_LIMIT = 80;

    let map;
    let userMarker;
    let currentPos = null;
    let markersLayer;

    function makeIcon(barrierFree) {
      const cls = barrierFree ? "barrier" : "normal";
      return L.divIcon({
        className: "",
        html: `<div class="pin-wrap ${cls}"><div class="pin"><span class="material-symbols-outlined">wc</span></div></div>`,
        iconSize: [28, 28],
        iconAnchor: [14, 28],
      });
    }

    function meIcon() {
      return L.divIcon({
        className: "",
        html: '<div class="me-dot"></div>',
        iconSize: [16, 16],
        iconAnchor: [8, 8],
      });
    }

    document.addEventListener("DOMContentLoaded", async () => {
      // メタ情報を読みに行ってバナー更新
      try {
        const meta = await fetch("/api/public/restrooms/meta").then((r) => r.json());
        document.getElementById("src-banner").textContent =
          `${meta.attribution}：大阪市内 ${meta.count}件のトイレ情報を表示`;
      } catch (e) {
        document.getElementById("src-banner").textContent =
          "大阪市公衆トイレデータを表示";
      }

      initMap(FALLBACK_CENTER);
      // 初回は全件マップに乗せる（大阪市内321件すべて）
      await loadRestrooms(FALLBACK_CENTER, { radius: INITIAL_RADIUS, limit: INITIAL_LIMIT });

      // 現在地の取得を試みる（失敗してもOK）
      tryGetCurrentPosition();

      // ボタン
      document.getElementById("btn-search").addEventListener("click", async () => {
        const c = map.getCenter();
        // 「このエリアで」は中心から半径NEARBY_RADIUSに絞る
        await loadRestrooms({ lat: c.lat, lng: c.lng }, { radius: NEARBY_RADIUS, limit: NEARBY_LIMIT });
      });
      document.getElementById("btn-myloc").addEventListener("click", () => {
        if (currentPos) {
          map.setView([currentPos.lat, currentPos.lng], 16);
          loadRestrooms(currentPos, { radius: NEARBY_RADIUS, limit: NEARBY_LIMIT });
        } else {
          tryGetCurrentPosition(true);
        }
      });
      document.getElementById("info-close").addEventListener("click", () => {
        document.getElementById("info-panel").classList.add("hidden");
      });
    });

    function initMap(center) {
      map = L.map("map", {
        zoomControl: true,
        attributionControl: false, // 下部に独自表示
      }).setView([center.lat, center.lng], 15);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors',
      }).addTo(map);

      markersLayer = L.layerGroup().addTo(map);

      // 地図クリックで情報パネルを閉じる
      map.on("click", () => {
        document.getElementById("info-panel").classList.add("hidden");
      });
    }

    async function loadRestrooms(center, opts = {}) {
      const radius = opts.radius != null ? opts.radius : NEARBY_RADIUS;
      const limit = opts.limit != null ? opts.limit : NEARBY_LIMIT;
      try {
        const url = `/api/public/restrooms?lat=${center.lat}&lng=${center.lng}&radius=${radius}&limit=${limit}`;
        const data = await fetch(url).then((r) => r.json());
        renderMarkers(data.items, center);
        if (data.items.length > 0) {
          showGpsStatus(`${data.items.length}件のトイレを表示中`);
        } else {
          showGpsStatus(`このエリアにはトイレ情報がありません`);
        }
      } catch (err) {
        showGpsStatus("データ取得失敗：" + err.message);
      }
    }

    function renderMarkers(items, center) {
      markersLayer.clearLayers();
      items.forEach((it) => {
        const marker = L.marker([it.lat, it.lng], { icon: makeIcon(it.barrierFree) });
        marker.on("click", () => showInfo(it, center));
        markersLayer.addLayer(marker);
      });
    }

    function showInfo(it, center) {
      document.getElementById("info-title").textContent = it.name || "（名称未登録）";
      const badges = [];
      if (it.barrierFree) badges.push('<span class="info-badge barrier">車いす対応／多目的</span>');
      else badges.push('<span class="info-badge normal">公衆便所</span>');
      document.getElementById("info-badges").innerHTML = badges.join("");
      document.getElementById("info-addr").textContent = it.address || "";
      document.getElementById("info-detail").textContent = it.detail || "";
      const dist = it.distance != null ? `${formatDistance(it.distance)}` : "";
      document.getElementById("info-dist").textContent = dist;

      // Google Maps 起動URL
      const q = encodeURIComponent(`${it.name} ${it.address || ""}`);
      document.getElementById("btn-gmap").href =
        `https://www.google.com/maps/search/?api=1&query=${q}&query_place_id=`;
      // 経路（現在地→施設）
      const dest = `${it.lat},${it.lng}`;
      const origin = currentPos ? `${currentPos.lat},${currentPos.lng}` : "";
      document.getElementById("btn-route").href =
        `https://www.google.com/maps/dir/?api=1&destination=${dest}` +
        (origin ? `&origin=${origin}` : "") + `&travelmode=walking`;

      document.getElementById("info-panel").classList.remove("hidden");
    }

    function formatDistance(m) {
      if (m < 1000) return `現在地から約 ${m}m`;
      return `現在地から約 ${(m / 1000).toFixed(1)}km`;
    }

    function tryGetCurrentPosition(force = false) {
      if (!navigator.geolocation) return;
      const status = document.getElementById("gps-status");
      status.textContent = "位置情報を取得中…";
      status.classList.remove("hidden");
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          currentPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          status.classList.add("hidden");
          if (userMarker) userMarker.remove();
          userMarker = L.marker([currentPos.lat, currentPos.lng], { icon: meIcon() }).addTo(map);
          if (force) {
            map.setView([currentPos.lat, currentPos.lng], 16);
            loadRestrooms(currentPos);
          }
        },
        (err) => {
          status.textContent = "位置情報なし（大阪駅周辺を表示中）";
          setTimeout(() => status.classList.add("hidden"), 2500);
        },
        { enableHighAccuracy: true, timeout: 8000, maximumAge: 60000 }
      );
    }

    function showGpsStatus(msg, ms = 2500) {
      const el = document.getElementById("gps-status");
      el.textContent = msg;
      el.classList.remove("hidden");
      if (ms) setTimeout(() => el.classList.add("hidden"), ms);
    }
  </script>
</body>
</html>
