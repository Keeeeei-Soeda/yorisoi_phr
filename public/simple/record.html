<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>きろくする - よりそい</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" />
  <style>
    body { padding-bottom: 96px; background: var(--gray-50); }

    .pane { display: none; padding: 20px 16px; }
    .pane.active { display: block; }
    .pane-title { font-size: 22px; font-weight: 700; letter-spacing: 1px; margin-bottom: 6px; }
    .pane-sub { font-size: 13px; color: var(--gray-500); margin-bottom: 24px; line-height: 1.7; }

    /* ========= ペイン1: 入力 ========= */
    .voice-area { text-align: center; padding: 16px 0 8px; }
    .voice-btn {
      width: 180px; height: 180px; border-radius: 50%;
      background: linear-gradient(135deg, var(--brand-400, #f4a7b0), var(--brand-600));
      color: #fff; border: none; cursor: pointer;
      box-shadow: 0 8px 24px rgba(244,167,176,0.4);
      display: inline-flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; transition: all 0.15s;
    }
    .voice-btn:active { transform: scale(0.96); }
    .voice-btn .material-symbols-outlined { font-size: 64px; }
    .voice-btn .label { font-size: 16px; font-weight: 700; letter-spacing: 1.5px; }
    .voice-btn.recording {
      background: linear-gradient(135deg, #fca5a5, #dc2626);
      animation: pulse 1.4s infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 8px 24px rgba(220,38,38,0.4); }
      50% { box-shadow: 0 8px 32px rgba(220,38,38,0.7); }
    }
    .voice-hint { font-size: 12px; color: var(--gray-500); margin-top: 12px; }

    .or-divider {
      text-align: center; font-size: 12px; color: var(--gray-400);
      padding: 24px 0 12px; position: relative;
    }
    .or-divider::before, .or-divider::after {
      content: ""; display: inline-block;
      width: 60px; height: 1px; background: var(--gray-200);
      vertical-align: middle; margin: 0 12px;
    }

    .text-area-wrap textarea {
      width: 100%; padding: 14px; font-size: 15px; font-family: inherit;
      border: 2px solid var(--gray-200); border-radius: 14px;
      background: var(--white); min-height: 120px; line-height: 1.6; resize: vertical;
    }
    .text-area-wrap textarea:focus { outline: none; border-color: var(--brand-400); }

    .ai-chat-toggle {
      display: flex; align-items: center; gap: 8px;
      padding: 14px 16px; background: var(--white);
      border: 2px solid var(--gray-200); border-radius: 14px;
      cursor: pointer; user-select: none;
    }
    .ai-chat-toggle .material-symbols-outlined { color: var(--brand-500); }
    .ai-chat-area {
      margin-top: 10px; padding: 16px;
      background: var(--brand-50); border-radius: 14px;
      border: 1px dashed var(--brand-300);
      display: none;
    }
    .ai-chat-area.open { display: block; }
    .ai-chat-msgs { max-height: 280px; overflow-y: auto; padding: 4px 0; }
    .chat-msg { padding: 8px 12px; border-radius: 12px; margin-bottom: 8px; font-size: 14px; line-height: 1.5; }
    .chat-msg.ai { background: var(--white); color: var(--gray-800); border: 1px solid var(--brand-200); }
    .chat-msg.me { background: var(--brand-500); color: #fff; margin-left: 30px; }
    .chat-input-row { display: flex; gap: 6px; margin-top: 8px; }
    .chat-input-row input {
      flex: 1; padding: 10px 12px; border: 1.5px solid var(--gray-300);
      border-radius: 18px; font-size: 14px; font-family: inherit;
    }
    .chat-input-row button {
      padding: 10px 14px; background: var(--brand-500); color: #fff;
      border: none; border-radius: 18px; font-weight: 700; font-size: 13px; cursor: pointer;
    }
    .chat-end-btn {
      width: 100%; margin-top: 10px; padding: 10px;
      background: var(--white); border: 1.5px solid var(--brand-400);
      color: var(--brand-700); border-radius: 12px; font-weight: 700; cursor: pointer;
    }

    /* ========= ペイン2: 整理 ========= */
    .confirm-card {
      background: var(--white); border: 2px solid var(--gray-200); border-radius: 14px;
      padding: 14px 16px; margin-bottom: 12px;
    }
    .confirm-label {
      font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--gray-500); margin-bottom: 6px;
    }
    .confirm-label .small { font-weight: 500; color: var(--gray-400); margin-left: 6px; font-size: 10px; }
    .confirm-value { font-size: 14px; line-height: 1.6; white-space: pre-wrap; color: var(--gray-800); }
    .confirm-card.ai { background: #fef9c3; border-color: #fde047; }
    .confirm-card.ai .confirm-label { color: #92400e; }

    .type-radio { display: flex; gap: 8px; }
    .type-radio label {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 14px 8px; border: 2px solid var(--gray-200); border-radius: 12px;
      cursor: pointer; background: var(--white); transition: all 0.15s;
    }
    .type-radio label.selected { border-color: var(--brand-500); background: var(--brand-50); color: var(--brand-700); }
    .type-radio label .material-symbols-outlined { font-size: 28px; }
    .type-radio label.self.selected { border-color: #0284c7; background: #f0f9ff; color: #0284c7; }
    .type-radio input { display: none; }

    .ai-judge {
      font-size: 11px; color: var(--gray-600); margin-top: 6px; padding: 4px 8px;
      background: var(--gray-50); border-radius: 6px; display: inline-block;
    }

    .clinic-pick-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .clinic-mini {
      padding: 8px 12px; border-radius: 10px; border: 1.5px solid var(--gray-300);
      background: var(--white); font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .clinic-mini.selected { background: var(--brand-500); color: #fff; border-color: var(--brand-500); }
    .clinic-mini .star { color: #fbbf24; margin-right: 2px; }
    .clinic-mini.selected .star { color: #fff; }
    .add-clinic-link {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 8px 12px; border-radius: 10px; border: 1.5px dashed var(--brand-300);
      color: var(--brand-700); font-size: 13px; font-weight: 700; text-decoration: none;
    }

    .dept-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .dept-mini {
      padding: 6px 12px; border-radius: 999px; background: var(--gray-100);
      font-size: 12px; cursor: pointer; border: 2px solid transparent;
    }
    .dept-mini.selected { background: var(--brand-500); color: #fff; border-color: var(--brand-500); }

    .field-input {
      width: 100%; padding: 10px 12px; font-size: 14px;
      border: 1.5px solid var(--gray-300); border-radius: 10px; font-family: inherit;
    }

    /* ========= ペイン3: 完了 ========= */
    .done-screen { text-align: center; padding: 60px 24px; }
    .done-icon {
      width: 80px; height: 80px; border-radius: 50%; background: var(--brand-100);
      display: inline-flex; align-items: center; justify-content: center; margin-bottom: 16px;
    }
    .done-icon .material-symbols-outlined { font-size: 48px; color: var(--brand-600); }
    .done-summary { font-size: 13px; color: var(--gray-600); margin: 8px 0 0; line-height: 1.6; }
    .done-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 28px; }
    .done-actions a, .done-actions button {
      padding: 14px; border-radius: 12px; text-decoration: none;
      font-size: 15px; font-weight: 700; text-align: center; cursor: pointer; border: none;
    }
    .done-actions .primary { background: var(--brand-500); color: var(--white); }
    .done-actions .secondary { background: var(--gray-100); color: var(--gray-700); }

    /* ========= 共通フッター ========= */
    .nav-footer {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px; padding: 12px 16px;
      background: var(--white); border-top: 1px solid var(--gray-200);
      display: flex; gap: 8px; z-index: 10;
    }
    .nav-btn {
      flex: 1; padding: 14px; border-radius: 12px; border: none;
      font-size: 15px; font-weight: 700; cursor: pointer; letter-spacing: 1px;
    }
    .nav-btn:active { transform: scale(0.98); }
    .nav-btn.secondary { background: var(--gray-100); color: var(--gray-700); }
    .nav-btn.primary { background: var(--brand-500); color: var(--white); }
    .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .processing { text-align: center; padding: 30px; color: var(--gray-500); font-size: 13px; }
    .processing .material-symbols-outlined { font-size: 32px; animation: spin 1.2s linear infinite; }
    @keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <button class="header-back" id="header-back">&larr;</button>
    <h1>きろくする</h1>
  </div>

  <!-- ===== ペイン1: 入力 ===== -->
  <div class="pane active" id="pane-input">
    <div class="pane-title">いまの状況をきろく</div>
    <div class="pane-sub">受診のお話でも、今日の体調でもOK。<br>あとでAIが整えてくれます。</div>

    <div class="voice-area">
      <button class="voice-btn" id="voice-btn">
        <span class="material-symbols-outlined">mic</span>
        <span class="label" id="voice-label">押して話す</span>
      </button>
      <div class="voice-hint" id="voice-hint">マイクをタップして話してください</div>
    </div>

    <div class="or-divider">または</div>

    <div class="text-area-wrap">
      <textarea id="raw-text" placeholder="例: 今日先生にレブラミドを続けて、3ヶ月後に再診って言われた...&#10;または: 今日は朝から手のしびれが少し強かった..."></textarea>
    </div>

    <div class="or-divider">または</div>

    <div class="ai-chat-toggle" id="chat-toggle">
      <span class="material-symbols-outlined">smart_toy</span>
      <span style="flex:1; font-weight:700;">AIと会話して書く</span>
      <span class="material-symbols-outlined" id="chat-toggle-icon">expand_more</span>
    </div>
    <div class="ai-chat-area" id="chat-area">
      <div class="ai-chat-msgs" id="chat-msgs"></div>
      <div class="chat-input-row">
        <input type="text" id="chat-input" placeholder="返事を書く..." />
        <button id="chat-send-btn">送る</button>
      </div>
      <button class="chat-end-btn" id="chat-end-btn">この内容で次へ</button>
    </div>
  </div>

  <!-- ===== AI整理処理中 ===== -->
  <div class="pane" id="pane-processing">
    <div class="processing">
      <span class="material-symbols-outlined">sync</span>
      <p>AIが内容を整えています...</p>
    </div>
  </div>

  <!-- ===== ペイン2: 整理確認 ===== -->
  <div class="pane" id="pane-confirm">
    <div class="pane-title">内容を確認</div>
    <div class="pane-sub">問題なければ「保存する」を押してください。</div>

    <div class="confirm-card">
      <div class="confirm-label">あなたが書いた・話した内容</div>
      <div class="confirm-value" id="display-raw"></div>
    </div>

    <div class="confirm-card ai">
      <div class="confirm-label">AIがまとめました</div>
      <div class="confirm-value" id="display-ai"></div>
    </div>

    <div class="confirm-card">
      <div class="confirm-label">記録の種類 <span class="small">タップで変えられます</span></div>
      <div class="type-radio">
        <label class="type-visit" id="type-visit-label">
          <input type="radio" name="record-type" value="visit">
          <span class="material-symbols-outlined">local_hospital</span>
          <span style="font-weight:700;">受診の記録</span>
        </label>
        <label class="type-self self" id="type-self-label">
          <input type="radio" name="record-type" value="self-log">
          <span class="material-symbols-outlined">favorite</span>
          <span style="font-weight:700;">体調の記録</span>
        </label>
      </div>
      <div class="ai-judge" id="ai-judge"></div>
    </div>

    <!-- 受診のとき -->
    <div id="visit-extra" style="display:none;">
      <div class="confirm-card">
        <div class="confirm-label">どこの病院？ <span class="small">あとで設定でもOK</span></div>
        <div class="clinic-pick-row" id="clinic-pick-row"></div>
        <div class="dept-row" id="dept-row"></div>
        <a class="add-clinic-link" id="add-clinic-link" href="/simple/clinics.html" style="margin-top:10px;">
          <span class="material-symbols-outlined" style="font-size:16px;">add</span>新しい病院を追加
        </a>
      </div>
      <div class="confirm-card">
        <div class="confirm-label">受診日</div>
        <input type="date" class="field-input" id="visit-date">
      </div>
    </div>

    <!-- 体調のとき -->
    <div id="self-extra" style="display:none;">
      <div class="confirm-card">
        <div class="confirm-label">記録日</div>
        <input type="date" class="field-input" id="self-date">
      </div>
    </div>
  </div>

  <!-- ===== ペイン3: 完了 ===== -->
  <div class="pane" id="pane-done">
    <div class="done-screen">
      <div class="done-icon"><span class="material-symbols-outlined">check</span></div>
      <div class="pane-title">記録しました</div>
      <p class="done-summary" id="done-summary">タイムラインに追加されています。</p>
      <div class="done-actions">
        <button class="primary" id="record-another">もう一件記録する</button>
        <a class="secondary" href="/" id="go-home">ホームに戻る</a>
      </div>
    </div>
  </div>

  <!-- ナビゲーション -->
  <div class="nav-footer" id="nav-footer">
    <button class="nav-btn secondary" id="btn-prev">もどる</button>
    <button class="nav-btn primary" id="btn-next">次へ</button>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js" defer></script>
  <script src="/js/liff-init.js"></script>
  <script src="/js/visit-recorder.js"></script>
  <script>
    let currentPane = "input"; // "input" | "processing" | "confirm" | "done"
    let clinics = [];
    let chatMessages = []; // {role, text}
    let parseResult = null; // AI parse-record の結果
    let state = {
      rawText: "",
      type: "self-log",
      clinicId: null,
      clinicName: null,
      department: null,
      date: new Date().toISOString().slice(0, 10),
    };

    function escHTML(s) { const d = document.createElement("div"); d.textContent = s || ""; return d.innerHTML; }

    function showPane(name) {
      currentPane = name;
      document.querySelectorAll(".pane").forEach(p => p.classList.remove("active"));
      document.getElementById("pane-" + name).classList.add("active");
      const footer = document.getElementById("nav-footer");
      const prev = document.getElementById("btn-prev");
      const next = document.getElementById("btn-next");
      if (name === "input") {
        footer.style.display = "flex";
        prev.style.visibility = "hidden";
        next.textContent = "次へ";
        next.disabled = !document.getElementById("raw-text").value.trim();
      } else if (name === "confirm") {
        footer.style.display = "flex";
        prev.style.visibility = "visible";
        prev.textContent = "もどる";
        next.textContent = "保存する";
        next.disabled = false;
      } else if (name === "processing" || name === "done") {
        footer.style.display = "none";
      }
      window.scrollTo(0, 0);
    }

    /* ============ 音声録音 ============ */
    let recording = false;
    async function onVoiceClick() {
      const btn = document.getElementById("voice-btn");
      const label = document.getElementById("voice-label");
      const hint = document.getElementById("voice-hint");
      try {
        if (!recording) {
          await VisitRecorder.startRecording();
          recording = true;
          btn.classList.add("recording");
          label.textContent = "話しています...";
          hint.textContent = "もう一度タップで停止します";
        } else {
          label.textContent = "整えています...";
          btn.disabled = true;
          const blob = await VisitRecorder.stopRecording();
          recording = false;
          btn.classList.remove("recording");
          const result = await VisitRecorder.transcribeBlob(blob);
          const transcript = (result.transcript || "").trim();
          if (transcript) {
            const ta = document.getElementById("raw-text");
            ta.value = ta.value ? (ta.value + "\n" + transcript) : transcript;
            ta.dispatchEvent(new Event("input"));
            hint.textContent = "うまく書き起こせました";
          } else {
            hint.textContent = "声が聞き取れませんでした。もう一度試してください。";
          }
          label.textContent = "押して話す";
          btn.disabled = false;
        }
      } catch (err) {
        console.error(err);
        recording = false;
        btn.classList.remove("recording");
        btn.disabled = false;
        label.textContent = "押して話す";
        hint.textContent = "マイクの許可が必要です: " + (err.message || err);
      }
    }

    /* ============ AIチャット ============ */
    function toggleChat() {
      const area = document.getElementById("chat-area");
      const icon = document.getElementById("chat-toggle-icon");
      area.classList.toggle("open");
      icon.textContent = area.classList.contains("open") ? "expand_less" : "expand_more";
      if (area.classList.contains("open") && chatMessages.length === 0) {
        // 初期メッセージ
        chatMessages.push({ role: "ai", text: "今日のことを教えてください。受診のお話でも、体調のことでも何でもOKです。" });
        renderChat();
      }
    }
    function renderChat() {
      const wrap = document.getElementById("chat-msgs");
      wrap.innerHTML = chatMessages.map(m => `<div class="chat-msg ${m.role === "ai" ? "ai" : "me"}">${escHTML(m.text)}</div>`).join("");
      wrap.scrollTop = wrap.scrollHeight;
    }
    async function sendChat() {
      const input = document.getElementById("chat-input");
      const text = input.value.trim();
      if (!text) return;
      chatMessages.push({ role: "me", text });
      input.value = "";
      renderChat();
      // 簡易AI応答（ローカル生成）: もう少し詳しく聞く
      const followUps = [
        "なるほど。他に気になっていることはありますか？",
        "もう少し詳しく教えてもらえますか？",
        "それはいつ頃から続いていますか？",
        "他にお伝えしたいことがあればどうぞ。",
      ];
      const reply = followUps[Math.min(chatMessages.filter(m => m.role === "ai").length, followUps.length - 1)];
      chatMessages.push({ role: "ai", text: reply });
      renderChat();
    }
    function endChat() {
      // チャット内容を rawText にまとめる（自分の発言だけ繋げる）
      const myMsgs = chatMessages.filter(m => m.role === "me").map(m => m.text).join("\n");
      if (!myMsgs) {
        alert("少し話してから「次へ」を押してください");
        return;
      }
      document.getElementById("raw-text").value = myMsgs;
      document.getElementById("raw-text").dispatchEvent(new Event("input"));
      // 入力ペインのまま「次へ」ボタンを押させる
      goToConfirm();
    }

    /* ============ 整理ペインへ ============ */
    async function goToConfirm() {
      const rawText = document.getElementById("raw-text").value.trim();
      if (!rawText) { alert("内容を入力してください"); return; }
      state.rawText = rawText;
      showPane("processing");
      try {
        const res = await apiPost("/api/ai/parse-record", {
          rawText,
          diseaseId: getDiseaseId(),
          currentDate: state.date,
          knownClinics: clinics.map(c => ({ id: c.id, name: c.name, departments: c.departments || [] })),
        });
        parseResult = res;
        state.type = res.type || "self-log";
        if (res.suggestedClinicId) {
          state.clinicId = res.suggestedClinicId;
          const c = clinics.find(c => c.id === res.suggestedClinicId);
          state.clinicName = c?.name || null;
        }
        if (res.suggestedDepartment) state.department = res.suggestedDepartment;
        renderConfirm();
        showPane("confirm");
      } catch (err) {
        console.error(err);
        // AI失敗してもそのまま整理画面に進める
        parseResult = { type: "self-log", confidence: 0, findings: null, nextActionDraft: null, selfLogTitle: rawText.slice(0, 30), selfLogDetail: rawText, suggestions: {} };
        state.type = "self-log";
        renderConfirm();
        showPane("confirm");
      }
    }

    function renderConfirm() {
      // 原文
      document.getElementById("display-raw").textContent = state.rawText;
      // AI整理
      let aiText = "";
      if (parseResult.type === "visit") {
        if (parseResult.findings) aiText += "■ 言われたこと\n" + parseResult.findings + "\n\n";
        if (parseResult.nextActionDraft) aiText += "■ 次にすること\n" + parseResult.nextActionDraft + "\n";
        if (parseResult.nextVisitDate) aiText += "\n📅 次回受診: " + parseResult.nextVisitDate;
      } else {
        if (parseResult.selfLogTitle) aiText += "■ " + parseResult.selfLogTitle + "\n\n";
        if (parseResult.selfLogDetail) aiText += parseResult.selfLogDetail;
      }
      document.getElementById("display-ai").textContent = aiText || "(整理結果が空でした)";

      // 種類ラジオ
      document.querySelectorAll('input[name="record-type"]').forEach(r => r.checked = (r.value === state.type));
      document.getElementById("type-visit-label").classList.toggle("selected", state.type === "visit");
      document.getElementById("type-self-label").classList.toggle("selected", state.type === "self-log");

      // AI判定表示
      const conf = Math.round((parseResult.confidence || 0) * 100);
      document.getElementById("ai-judge").textContent = `🤖 AIの判定: ${parseResult.type === "visit" ? "受診の記録" : "体調の記録"}（${conf}%）`;

      // visit/self の追加フィールド
      document.getElementById("visit-extra").style.display = state.type === "visit" ? "" : "none";
      document.getElementById("self-extra").style.display = state.type === "self-log" ? "" : "none";

      // クリニック・診療科
      renderClinicPickRow();
      renderDeptRow();

      document.getElementById("visit-date").value = state.date;
      document.getElementById("self-date").value = state.date;
    }

    function renderClinicPickRow() {
      const row = document.getElementById("clinic-pick-row");
      if (!clinics.length) {
        row.innerHTML = '<p style="font-size:13px; color:var(--gray-500);">登録された病院がまだありません。下のボタンから追加できます。</p>';
        return;
      }
      const sorted = [...clinics].sort((a, b) => (b.isPrimary ? 1 : 0) - (a.isPrimary ? 1 : 0));
      row.innerHTML = sorted.map(c => {
        const star = c.isPrimary ? '<span class="star">★</span>' : '';
        return `<button class="clinic-mini ${c.id === state.clinicId ? 'selected' : ''}" data-id="${c.id}">${star}${escHTML(c.name)}</button>`;
      }).join("");
      row.querySelectorAll(".clinic-mini").forEach(btn => {
        btn.addEventListener("click", () => {
          state.clinicId = btn.dataset.id;
          const c = clinics.find(c => c.id === state.clinicId);
          state.clinicName = c?.name || null;
          // 診療科がデフォルトで先頭
          if (c && c.departments?.length) state.department = c.departments[0];
          renderClinicPickRow();
          renderDeptRow();
        });
      });
    }
    function renderDeptRow() {
      const row = document.getElementById("dept-row");
      if (!state.clinicId) { row.innerHTML = ""; return; }
      const c = clinics.find(c => c.id === state.clinicId);
      const depts = c?.departments || [];
      row.innerHTML = depts.map(d => `<button class="dept-mini ${state.department === d ? 'selected' : ''}" data-d="${escHTML(d)}">${escHTML(d)}</button>`).join("");
      row.querySelectorAll(".dept-mini").forEach(btn => {
        btn.addEventListener("click", () => {
          state.department = btn.dataset.d;
          renderDeptRow();
        });
      });
    }

    /* ============ 保存 ============ */
    async function save() {
      const next = document.getElementById("btn-next");
      next.disabled = true;
      next.textContent = "保存中...";

      try {
        if (state.type === "visit") {
          // visit + timeline_event を作成（クリニック未選択でも保存可能）
          const visit = await apiPost("/api/visits", {
            date: document.getElementById("visit-date").value || state.date,
            clinicId: state.clinicId || null,
            department: state.department || "",
            chiefComplaint: "",
            findings: parseResult.findings || state.rawText,
            nextAction: parseResult.nextActionDraft || "",
            photos: [],
            relatedMedicationIds: [],
            relatedLabResultIds: [],
            relatedTimelineEventId: null,
          });
          const title = state.clinicName
            ? `${state.clinicName}${state.department ? " " + state.department : ""} 受診`
            : "受診の記録";
          const event = await apiPost("/api/timeline", {
            date: document.getElementById("visit-date").value || state.date,
            category: "visit",
            title,
            detail: (parseResult.findings || state.rawText).slice(0, 200),
            source: "manual",
          });
          if (event && event.id && visit && visit.id) {
            await apiPut(`/api/visits/${visit.id}`, { relatedTimelineEventId: event.id });
          }
        } else {
          const title = (parseResult.selfLogTitle || state.rawText.slice(0, 30)).slice(0, 60);
          await apiPost("/api/timeline", {
            date: document.getElementById("self-date").value || state.date,
            category: "self-log",
            title,
            detail: parseResult.selfLogDetail || state.rawText,
            source: "self-log",
          });
        }
        document.getElementById("done-summary").textContent =
          state.type === "visit"
            ? "受診の記録としてタイムラインに追加されました。"
            : "体調の記録としてタイムラインに追加されました。";
        showPane("done");
      } catch (err) {
        console.error("save error:", err);
        alert("保存に失敗しました: " + (err.message || err));
        next.disabled = false;
        next.textContent = "保存する";
      }
    }

    /* ============ イベント ============ */
    function attach() {
      document.getElementById("voice-btn").addEventListener("click", onVoiceClick);
      document.getElementById("chat-toggle").addEventListener("click", toggleChat);
      document.getElementById("chat-send-btn").addEventListener("click", sendChat);
      document.getElementById("chat-input").addEventListener("keypress", (e) => { if (e.key === "Enter") sendChat(); });
      document.getElementById("chat-end-btn").addEventListener("click", endChat);

      document.getElementById("raw-text").addEventListener("input", (e) => {
        document.getElementById("btn-next").disabled = !e.target.value.trim();
      });

      // 種類変更
      document.querySelectorAll('input[name="record-type"]').forEach(r => {
        r.addEventListener("change", () => {
          state.type = r.value;
          renderConfirm();
        });
      });
      document.getElementById("type-visit-label").addEventListener("click", () => { state.type = "visit"; renderConfirm(); });
      document.getElementById("type-self-label").addEventListener("click", () => { state.type = "self-log"; renderConfirm(); });

      // フッター
      document.getElementById("btn-next").addEventListener("click", () => {
        if (currentPane === "input") goToConfirm();
        else if (currentPane === "confirm") save();
      });
      document.getElementById("btn-prev").addEventListener("click", () => {
        if (currentPane === "confirm") showPane("input");
      });
      document.getElementById("header-back").addEventListener("click", () => {
        if (currentPane === "confirm") { showPane("input"); return; }
        if (currentPane === "done") { location.href = "/" + location.search; return; }
        location.href = "/" + location.search;
      });

      // もう一件
      document.getElementById("record-another").addEventListener("click", () => {
        // 状態リセット
        state = {
          rawText: "", type: "self-log",
          clinicId: null, clinicName: null, department: null,
          date: new Date().toISOString().slice(0, 10),
        };
        chatMessages = [];
        parseResult = null;
        document.getElementById("raw-text").value = "";
        document.getElementById("chat-msgs").innerHTML = "";
        const area = document.getElementById("chat-area");
        if (area.classList.contains("open")) toggleChat();
        showPane("input");
      });
      document.getElementById("go-home").href = "/" + location.search;
      document.getElementById("add-clinic-link").href = "/simple/clinics.html" + location.search;
    }

    document.addEventListener("DOMContentLoaded", async () => {
      try { await initLiff(); } catch (_) {}
      attach();
      try { clinics = await apiGet("/api/clinics") || []; } catch (_) { clinics = []; }
      showPane("input");
    });
  </script>
</body>
</html>
