<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>患者体験記 — よりそい PHR</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* フィルターバー */
    .filter-bar {
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
      padding: 12px 16px;
      position: sticky;
      top: 56px;
      z-index: 90;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filter-label {
      font-size: 13px;
      color: var(--gray-600);
      white-space: nowrap;
    }

    .disease-toggle-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }

    .toggle-switch {
      position: relative;
      width: 42px;
      height: 24px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--gray-300);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: "";
      position: absolute;
      left: 3px;
      top: 3px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--white);
      transition: transform 0.2s;
    }

    .toggle-switch input:checked + .toggle-slider {
      background: var(--brand-500);
    }

    .toggle-switch input:checked + .toggle-slider::before {
      transform: translateX(18px);
    }

    .toggle-switch input:disabled + .toggle-slider {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .toggle-text {
      font-size: 13px;
      color: var(--gray-700);
      white-space: nowrap;
    }

    /* 疾患タブ */
    .disease-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .disease-tab {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      border: 1.5px solid var(--gray-300);
      background: var(--white);
      color: var(--gray-600);
      cursor: pointer;
      transition: all 0.15s;
    }

    .disease-tab.active {
      border-color: var(--brand-500);
      background: var(--brand-50);
      color: var(--brand-700);
    }

    /* 体験記カード */
    .story-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 12px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .story-card:active {
      transform: scale(0.98);
      box-shadow: var(--shadow-sm);
    }

    .story-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .disease-badge {
      padding: 2px 10px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 700;
    }

    .disease-badge-cml  { background: #dbeafe; color: #1d4ed8; }
    .disease-badge-aml  { background: #fee2e2; color: #991b1b; }
    .disease-badge-all  { background: #fef3c7; color: #92400e; }
    .disease-badge-cll  { background: #dcfce7; color: #14532d; }
    .disease-badge-other { background: var(--gray-200); color: var(--gray-600); }

    .story-attr {
      font-size: 11px;
      color: var(--gray-500);
      background: var(--gray-100);
      padding: 2px 8px;
      border-radius: 8px;
    }

    .story-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--gray-800);
      line-height: 1.4;
      margin-bottom: 6px;
    }

    .story-summary {
      font-size: 13px;
      color: var(--gray-600);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .story-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
    }

    .story-date {
      font-size: 12px;
      color: var(--gray-400);
    }

    .story-arrow {
      font-size: 18px;
      color: var(--gray-400);
    }

    /* 免責バナー */
    .disclaimer {
      background: #fefce8;
      border: 1px solid #fde68a;
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      margin-bottom: 16px;
      font-size: 12px;
      color: #92400e;
      line-height: 1.5;
    }

    .disclaimer-icon {
      font-size: 14px;
      vertical-align: middle;
      margin-right: 4px;
    }

    /* カウント表示 */
    .stories-count {
      font-size: 13px;
      color: var(--gray-500);
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <!-- ヘッダー -->
  <div class="header" id="main-header">
    <button class="header-back" onclick="history.back()">
      <span class="material-symbols-outlined">arrow_back</span>
    </button>
    <h1>患者体験記</h1>
  </div>

  <!-- フィルターバー -->
  <div class="filter-bar">
    <div class="disease-tabs" id="disease-tabs">
      <button class="disease-tab active" data-disease="all">すべて</button>
      <button class="disease-tab" data-disease="cml">CML</button>
      <button class="disease-tab" data-disease="aml">AML</button>
      <button class="disease-tab" data-disease="all_type">ALL</button>
      <button class="disease-tab" data-disease="cll">CLL</button>
    </div>
    <div class="disease-toggle-wrap" id="my-disease-toggle-wrap">
      <label class="toggle-switch">
        <input type="checkbox" id="my-disease-toggle" disabled>
        <span class="toggle-slider"></span>
      </label>
      <span class="toggle-text" id="toggle-label">自分の疾患のみ</span>
    </div>
  </div>

  <div class="content">
    <!-- 免責文言 -->
    <div class="disclaimer">
      <span class="disclaimer-icon">⚠️</span>
      本コンテンツは個人の体験であり、治療の推奨ではありません。
      治療に関する判断は必ず主治医にご相談ください。
    </div>

    <p class="stories-count" id="stories-count"></p>
    <div id="stories-list"></div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js" defer></script>
  <script src="/js/liff-init.js"></script>
  <script>
    const DISEASE_LABELS = {
      cml: "CML",
      aml: "AML",
      all: "ALL",
      cll: "CLL",
      other: "その他",
    };

    const GENDER_LABELS = {
      male: "男性",
      female: "女性",
      unanswered: "",
    };

    let currentDisease = "all";
    let myDiseaseType = null;
    let allStories = [];

    document.addEventListener("DOMContentLoaded", async () => {
      try {
        const { template } = await initLiff();

        // ヘッダー色
        if (template?.color) {
          document.getElementById("main-header").style.background =
            `linear-gradient(135deg, ${template.color}, ${template.color}dd)`;
        }

        // プロフィールから疾患を取得（デモモードでも動作）
        try {
          const profile = await apiGet("/api/profile");
          if (profile?.diseaseSubtype) {
            myDiseaseType = profile.diseaseSubtype;
          }
        } catch (_) {}

        // 「自分の疾患のみ」トグルの初期化
        setupDiseaseToggle();

        // 体験記一覧を取得・表示
        await loadStories();

        // 疾患タブのイベント
        document.getElementById("disease-tabs").addEventListener("click", (e) => {
          const btn = e.target.closest(".disease-tab");
          if (!btn) return;
          document.querySelectorAll(".disease-tab").forEach((t) => t.classList.remove("active"));
          btn.classList.add("active");
          // ALLタブはAPIパラメータ"all"（疾患種別）と"all"（全件）が被るので内部で変換
          currentDisease = btn.dataset.disease === "all_type" ? "all_filter" : btn.dataset.disease;
          renderStories();
        });

        // 「自分の疾患のみ」トグルのイベント
        document.getElementById("my-disease-toggle").addEventListener("change", renderStories);

      } catch (err) {
        console.error("Init error:", err);
        document.getElementById("stories-list").innerHTML =
          '<p class="text-sm" style="color:var(--danger)">読み込みに失敗しました</p>';
      }
    });

    function setupDiseaseToggle() {
      const toggle = document.getElementById("my-disease-toggle");
      const label = document.getElementById("toggle-label");
      if (myDiseaseType) {
        toggle.disabled = false;
        label.textContent = `${DISEASE_LABELS[myDiseaseType] || myDiseaseType}のみ`;
      } else {
        toggle.disabled = true;
        label.textContent = "自分の疾患のみ";
        label.title = "疾患サブタイプを登録すると絞り込めます";
      }
    }

    async function loadStories() {
      showLoading("stories-list");
      try {
        // API から全件取得（?t= でブラウザキャッシュを回避）
        allStories = await apiGet(`/api/stories?t=${Date.now()}`);
        renderStories();
      } catch (err) {
        document.getElementById("stories-list").innerHTML =
          '<div class="empty-state"><div class="empty-state-icon">📖</div><p class="empty-state-text">体験記を読み込めませんでした</p></div>';
      }
    }

    function renderStories() {
      const myOnlyToggle = document.getElementById("my-disease-toggle");
      const useMyDisease = myOnlyToggle.checked && myDiseaseType;

      let filtered = allStories;

      if (useMyDisease) {
        filtered = filtered.filter((s) => s.disease_type === myDiseaseType);
      } else if (currentDisease !== "all") {
        // "all_filter" は ALL疾患のフィルタ
        const diseaseParam = currentDisease === "all_filter" ? "all" : currentDisease;
        filtered = filtered.filter((s) => s.disease_type === diseaseParam);
      }

      const countEl = document.getElementById("stories-count");
      countEl.textContent = `${filtered.length}件の体験記`;

      if (filtered.length === 0) {
        document.getElementById("stories-list").innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📖</div>
            <p class="empty-state-text">該当する体験記がまだありません</p>
          </div>`;
        return;
      }

      const html = filtered.map((story) => {
        const diseaseKey = story.disease_type || "other";
        const diseaseBadge = `<span class="disease-badge disease-badge-${escapeHtml(diseaseKey)}">${escapeHtml(DISEASE_LABELS[diseaseKey] || diseaseKey)}</span>`;
        const ageBadge = story.age_at_diagnosis ? `<span class="story-attr">${story.age_at_diagnosis}代</span>` : "";
        const genderBadge = story.gender && story.gender !== "unanswered"
          ? `<span class="story-attr">${escapeHtml(GENDER_LABELS[story.gender] || "")}</span>` : "";
        const dateStr = story.published_at
          ? new Date(story.published_at).toLocaleDateString("ja-JP", { year: "numeric", month: "long" })
          : "";

        const diseaseParam = _diseaseId ? `?disease=${_diseaseId}` : "";
        return `
          <a href="/stories-detail.html${diseaseParam}&id=${encodeURIComponent(story.story_id)}" class="story-card">
            <div class="story-meta">
              ${diseaseBadge}${ageBadge}${genderBadge}
            </div>
            <div class="story-title">${escapeHtml(story.title)}</div>
            <div class="story-summary">${escapeHtml(story.summary_fact || "")}</div>
            <div class="story-footer">
              <span class="story-date">${escapeHtml(dateStr)}</span>
              <span class="story-arrow"><span class="material-symbols-outlined">chevron_right</span></span>
            </div>
          </a>`;
      }).join("");

      document.getElementById("stories-list").innerHTML = html;
    }
  </script>
</body>
</html>
